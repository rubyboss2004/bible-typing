<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Typing Practice — WEB</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fdf6ee;
            color: #3d2b1c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        /* ── Menu ── */
        #screen-menu {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        h1 { font-size: 1.9rem; color: #2d1f12; margin-bottom: 6px; }

        .subtitle { color: #9a7a5c; font-size: 0.9rem; margin-bottom: 32px; }

        .book-section {
            margin-bottom: 28px;
            background: #fff9f2;
            border: 1px solid #e0c8aa;
            border-radius: 12px;
            padding: 20px;
        }

        .book-title {
            font-size: 0.82rem;
            color: #c9855a;
            font-weight: bold;
            letter-spacing: 0.06em;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .chapters-grid { display: flex; gap: 10px; flex-wrap: wrap; }

        .chapter-btn {
            background: #fff3e6;
            border: 1px solid #e0c8aa;
            color: #3d2b1c;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            min-width: 120px;
            text-align: center;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .chapter-btn:hover { border-color: #c9855a; color: #2d1f12; background: #fce8d5; }

        .chapter-btn.completed { border-color: #238636; }

        .chapter-btn .badge {
            display: block;
            font-size: 0.72rem;
            color: #3fb950;
            margin-top: 4px;
        }

        /* ── Typing ── */
        #screen-typing {
            display: none;
            max-width: 820px;
            margin: 0 auto;
            padding: 36px 24px 60px;
        }

        .typing-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .typing-title { font-size: 1rem; color: #c9855a; font-weight: bold; }

        .typing-stats { display: flex; gap: 28px; color: #9a7a5c; font-size: 0.88rem; }

        .stat-val { color: #2d1f12; font-weight: bold; }

        #exit-btn {
            background: none;
            border: 1px solid #d4b896;
            color: #9a7a5c;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: border-color 0.15s, color 0.15s;
        }

        #exit-btn:hover { border-color: #f85149; color: #f85149; }

        .text-display {
            background: #fdf0e2;
            border: 1px solid #d4b896;
            border-radius: 12px;
            padding: 32px 36px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 2;
            max-height: 62vh;
            overflow-y: auto;
            cursor: text;
            user-select: none;
            outline: none;
            transition: border-color 0.15s;
            scroll-behavior: smooth;
        }

        .text-display:focus { border-color: #c9855a; }

        .hint {
            text-align: center;
            color: #c4a882;
            font-size: 0.78rem;
            margin-top: 10px;
        }

        /* Characters */
        .ch {
            position: relative;
            color: #c4a882;
        }

        .ch.correct { color: #3d2b1c; }

        .ch.wrong { color: #c0392b; }

        .ch.cursor {
            background: #c9855a;
            color: #fff9f2;
            border-radius: 2px;
        }

        .verse-num {
            color: #c4a882;
            font-size: 0.72em;
            font-weight: 700;
            padding-right: 3px;
            user-select: none;
            vertical-align: baseline;
        }

        /* ── Results ── */
        #screen-results {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
        }

        #screen-results {
            background: #fff9f2;
            border: 1px solid #e0c8aa;
            border-radius: 16px;
            margin-top: 40px;
        }

        .results-title { font-size: 1.4rem; color: #2d1f12; }

        .complete-tag {
            display: inline-block;
            background: #0d4a1f;
            color: #3fb950;
            font-size: 0.78rem;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 10px;
            letter-spacing: 0.05em;
        }

        .results-grid {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin: 40px 0;
        }

        .result-item { display: flex; flex-direction: column; align-items: center; }

        .result-val {
            font-size: 2.6rem;
            font-weight: bold;
            color: #3fb950;
            font-variant-numeric: tabular-nums;
        }

        .result-lbl {
            font-size: 0.8rem;
            color: #9a7a5c;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .results-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 8px;
        }

        .btn-primary {
            background: #238636;
            border: 1px solid #2ea043;
            color: #fff;
            padding: 12px 26px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: #2ea043; }

        .btn-secondary {
            background: #fdf0e2;
            border: 1px solid #d4b896;
            color: #4a3728;
            padding: 12px 26px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .btn-secondary:hover { border-color: #c9855a; }

        /* scrollbar */
        .text-display::-webkit-scrollbar { width: 6px; }
        .text-display::-webkit-scrollbar-track { background: transparent; }
        .text-display::-webkit-scrollbar-thumb { background: #d4b896; border-radius: 3px; }

        /* ── Lookup sidebar ── */
        .typing-layout {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .typing-main { flex: 1; min-width: 0; }

        .lookup-panel {
            width: 240px;
            flex-shrink: 0;
            background: #fdf0e2;
            border: 1px solid #d4b896;
            border-radius: 12px;
            padding: 18px;
            position: sticky;
            top: 20px;
        }

        .lookup-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #c9855a;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .lookup-row {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        #lookup-input {
            flex: 1;
            background: #fff9f0;
            border: 1px solid #d4b896;
            border-radius: 6px;
            color: #2d1f12;
            font-size: 0.88rem;
            font-family: inherit;
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.15s;
        }

        #lookup-input:focus { border-color: #c9855a; }

        #lookup-btn {
            background: #fff3e6;
            border: 1px solid #d4b896;
            color: #4a3728;
            border-radius: 6px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.88rem;
            font-family: inherit;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
        }

        #lookup-btn:hover { border-color: #c9855a; color: #2d1f12; }

        .lookup-result-word {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d1f12;
            margin-bottom: 6px;
        }

        .lookup-result-translation {
            font-size: 1rem;
            color: #3fb950;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .lookup-status {
            font-size: 0.82rem;
            color: #9a7a5c;
            font-style: italic;
        }

        .cambridge-link {
            display: none;
            font-size: 0.78rem;
            color: #c9855a;
            text-decoration: none;
            border-top: 1px solid #fff3e6;
            padding-top: 10px;
            margin-top: 4px;
        }

        .cambridge-link:hover { text-decoration: underline; }

        /* ── Menu progress ── */
        .overall-progress {
            background: #fff9f2;
            border: 1px solid #e0c8aa;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 16px;
        }
        .overall-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #9a7a5c;
            margin-bottom: 8px;
        }
        .overall-progress-label .pct { color: #3fb950; font-weight: 700; }
        .progress-bar-track { background: #fff3e6; border-radius: 4px; height: 5px; overflow: hidden; }
        .progress-bar-fill { background: #3fb950; height: 100%; border-radius: 4px; transition: width 0.4s; }

        .vocab-menu-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: #fff9f2;
            border: 1px solid #e0c8aa;
            color: #3d2b1c;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-family: inherit;
            margin-bottom: 20px;
            transition: border-color 0.15s, background 0.15s;
        }
        .vocab-menu-btn:hover { border-color: #c9855a; background: #fff3e6; color: #2d1f12; }
        .vocab-menu-btn .count { color: #c9855a; font-weight: 700; }

        /* ── Vocab screen ── */
        #screen-vocab {
            display: none;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }
        .vocab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .vocab-header h2 { font-size: 1.3rem; color: #2d1f12; }
        .vocab-mode-toggle { display: flex; gap: 8px; }
        .mode-btn {
            background: #fff3e6;
            border: 1px solid #d4b896;
            color: #9a7a5c;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: background 0.15s;
        }
        .mode-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

        .vocab-empty { color: #9a7a5c; font-size: 0.9rem; padding-top: 16px; }
        .vocab-list { display: flex; flex-direction: column; gap: 10px; }
        .vocab-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: #fff9f2;
            border: 1px solid #e0c8aa;
            border-radius: 8px;
            padding: 14px 16px;
            gap: 12px;
        }
        .vocab-item-left { flex: 1; }
        .vocab-word { font-weight: 600; color: #2d1f12; margin-bottom: 3px; }
        .vocab-translation { color: #3fb950; font-size: 0.92rem; margin-bottom: 5px; }
        .vocab-meta { font-size: 0.72rem; color: #c4a882; }
        .vocab-delete {
            background: none; border: none; color: #c4a882;
            cursor: pointer; font-size: 1rem; padding: 0 4px;
            transition: color 0.15s; flex-shrink: 0;
        }
        .vocab-delete:hover { color: #f85149; }

        /* Flashcard */
        .flashcard-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 16px; }
        .flashcard {
            width: 100%; max-width: 480px; min-height: 200px;
            background: #fff9f2; border: 1px solid #e0c8aa; border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; padding: 32px; text-align: center;
            transition: border-color 0.2s; user-select: none; margin-bottom: 16px;
        }
        .flashcard:hover { border-color: #c9855a; }
        .flashcard-front-word { font-size: 1.6rem; font-weight: 600; color: #2d1f12; }
        .flashcard-back { display: none; text-align: center; }
        .flashcard-back-translation { font-size: 1.3rem; color: #3fb950; margin-bottom: 6px; }
        .flashcard-back-meta { font-size: 0.72rem; color: #c4a882; }
        .flashcard.flipped .flashcard-front-word { display: none; }
        .flashcard.flipped .flashcard-back { display: block; }
        .flashcard-hint { font-size: 0.72rem; color: #c4a882; margin-bottom: 14px; }
        .flashcard-controls { display: flex; gap: 12px; align-items: center; }
        .flashcard-counter { color: #9a7a5c; font-size: 0.85rem; min-width: 60px; text-align: center; }

        /* ── Resume overlay ── */
        .resume-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 100;
            align-items: center; justify-content: center;
        }
        .resume-overlay.active { display: flex; }
        .resume-card {
            background: #fff9f2; border: 1px solid #e0c8aa;
            border-radius: 14px; padding: 32px;
            max-width: 360px; width: 90%; text-align: center;
        }
        .resume-card h3 { color: #2d1f12; margin-bottom: 8px; font-size: 1.05rem; }
        .resume-card p { color: #9a7a5c; font-size: 0.85rem; margin-bottom: 24px; line-height: 1.6; }
        .resume-actions { display: flex; gap: 12px; justify-content: center; }

        /* Chapter in-progress badge */
        .chapter-btn .in-progress { display: block; font-size: 0.72rem; color: #c9855a; margin-top: 4px; }

        /* ── RWD ── */
        @media (max-width: 700px) {
            #screen-menu { padding: 32px 16px; }
            h1 { font-size: 1.4rem; }
            .subtitle { margin-bottom: 32px; }
            .chapter-btn { min-width: 90px; padding: 12px 14px; }

            #screen-typing { padding: 20px 12px 40px; }
            .typing-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .typing-layout { flex-direction: column; }
            .lookup-panel { width: 100%; position: static; }
            .text-display { padding: 20px 16px; font-size: 0.95rem; max-height: 52vh; }

            #screen-results { padding: 48px 16px; }
            .results-grid { gap: 28px; }
            .result-val { font-size: 2rem; }
            .results-actions { flex-direction: column; align-items: stretch; }
            .btn-primary, .btn-secondary { text-align: center; }
        }
    </style>
</head>
<body>

<!-- Menu -->
<div id="screen-menu">
    <h1>Bible Typing Practice</h1>
    <p class="subtitle">World English Bible (WEB) · Public Domain</p>
    <div class="overall-progress" id="overall-progress">
        <div class="overall-progress-label">
            <span id="progress-label">已完成 0/10 章</span>
            <span class="pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <button class="vocab-menu-btn" onclick="showVocab()">
        <span>📖 單字本</span>
        <span class="count" id="vocab-count">0 個單字</span>
    </button>
    <div id="books-container"></div>
</div>

<!-- Typing -->
<div id="screen-typing">
    <div class="typing-header">
        <span class="typing-title" id="chapter-title"></span>
        <div class="typing-stats">
            <span>Time: <span class="stat-val" id="stat-time">0:00</span></span>
            <span>Errors: <span class="stat-val" id="stat-errors">0</span></span>
        </div>
        <button id="exit-btn" onclick="exitToMenu()">Exit</button>
    </div>
    <div class="typing-layout">
        <div class="typing-main">
            <div class="text-display" id="text-display" tabindex="0"></div>
            <p class="hint">Click the text to start · Backspace to go back · Esc to exit</p>
        </div>
        <div class="lookup-panel">
            <div class="lookup-title">查翻譯</div>
            <div class="lookup-row">
                <input type="text" id="lookup-input" placeholder="單字或片語..." autocomplete="off" spellcheck="false">
                <button id="lookup-btn" onclick="lookupWord()">查</button>
            </div>
            <div id="lookup-result"></div>
            <a id="cambridge-link" class="cambridge-link" href="#" target="_blank">Cambridge Dictionary →</a>
        </div>
    </div>
</div>

<!-- Resume overlay -->
<div class="resume-overlay" id="resume-overlay">
    <div class="resume-card">
        <h3>繼續上次的進度？</h3>
        <p id="resume-desc"></p>
        <div class="resume-actions">
            <button class="btn-secondary" onclick="doRestart()">重新開始</button>
            <button class="btn-primary" onclick="doResume()">繼續</button>
        </div>
    </div>
</div>

<!-- Vocab screen -->
<div id="screen-vocab">
    <div class="vocab-header">
        <div>
            <button class="btn-secondary" onclick="goToMenu()" style="margin-bottom:12px">← 返回</button>
            <h2>單字本</h2>
        </div>
        <div class="vocab-mode-toggle">
            <button class="mode-btn active" id="mode-list-btn" onclick="setVocabMode('list')">清單</button>
            <button class="mode-btn" id="mode-card-btn" onclick="setVocabMode('card')">單字卡</button>
        </div>
    </div>
    <div id="vocab-content"></div>
</div>

<!-- Results -->
<div id="screen-results">
    <div class="results-title" id="result-title"></div>
    <span class="complete-tag">COMPLETE</span>
    <div class="results-grid">
        <div class="result-item">
            <span class="result-val" id="result-accuracy"></span>
            <span class="result-lbl">Accuracy</span>
        </div>
        <div class="result-item">
            <span class="result-val" id="result-time"></span>
            <span class="result-lbl">Time</span>
        </div>
        <div class="result-item">
            <span class="result-val" id="result-errors"></span>
            <span class="result-lbl">Errors</span>
        </div>
    </div>
    <div class="results-actions">
        <button class="btn-secondary" onclick="goToMenu()">← Menu</button>
        <button class="btn-primary" id="next-btn" onclick="goToNext()"></button>
    </div>
</div>

<script>
// ── Bible text ──────────────────────────────────────────────────────────────
const BIBLE = {
  "1TIM": {
    name: "1 Timothy",
    chapters: {
      1: `1 Paul, an apostle of Jesus Christ according to the commandment of God our Savior and the Lord Jesus Christ our hope, 2 to Timothy, my true child in faith: Grace, mercy, and peace from God our Father and Christ Jesus our Lord.

3 As I urged you when I was going into Macedonia, stay at Ephesus that you might command certain men not to teach a different doctrine, 4 and not to pay attention to myths and endless genealogies, which cause disputes rather than God's stewardship, which is in faith. 5 But the goal of this command is love from a pure heart, a good conscience, and sincere faith, 6 from which things some, having missed the mark, have turned away to vain talking, 7 desiring to be teachers of the law, though they understand neither what they say nor about what they strongly affirm.

8 But we know that the law is good if a person uses it lawfully, 9 as knowing this, that law is not made for a righteous person, but for the lawless and insubordinate, for the ungodly and sinners, for the unholy and profane, for murderers of fathers and murderers of mothers, for manslayers, 10 for the sexually immoral, for homosexuals, for slave-traders, for liars, for perjurers, and for any other thing contrary to the sound doctrine, 11 according to the Good News of the glory of the blessed God, which was committed to my trust.

12 I thank him who enabled me, Christ Jesus our Lord, because he counted me faithful, appointing me to service, 13 although I used to be a blasphemer, a persecutor, and insolent. However, I obtained mercy because I did it ignorantly in unbelief. 14 The grace of our Lord abounded exceedingly with faith and love which is in Christ Jesus. 15 The saying is faithful and worthy of all acceptance, that Christ Jesus came into the world to save sinners, of whom I am chief. 16 However, for this cause I obtained mercy, that in me first, Jesus Christ might display all his patience for an example of those who were going to believe in him for eternal life. 17 Now to the King eternal, immortal, invisible, to God who alone is wise, be honor and glory forever and ever. Amen.

18 I commit this instruction to you, my child Timothy, according to the prophecies which were given to you before, that by them you may wage the good warfare, 19 holding faith and a good conscience, which some having thrust away made a shipwreck concerning the faith, 20 of whom are Hymenaeus and Alexander, whom I delivered to Satan that they might be taught not to blaspheme.`,

      2: `1 I exhort therefore, first of all, that petitions, prayers, intercessions, and givings of thanks be made for all men, 2 for kings and all who are in high places, that we may lead a tranquil and quiet life in all godliness and reverence. 3 For this is good and acceptable in the sight of God our Savior, 4 who desires all people to be saved and come to full knowledge of the truth. 5 For there is one God and one mediator between God and men, the man Christ Jesus, 6 who gave himself as a ransom for all, the testimony at the proper time, 7 to which I was appointed a preacher and an apostle—I am telling the truth in Christ, not lying—a teacher of the Gentiles in faith and truth.

8 I desire therefore that the men in every place pray, lifting up holy hands without anger and doubting. 9 In the same way, that women also adorn themselves in decent clothing, with modesty and propriety, not with braided hair, gold, pearls, or expensive clothing, 10 but with good works, which is appropriate for women professing godliness. 11 Let a woman learn in quietness with full submission. 12 But I don't permit a woman to teach, nor to exercise authority over a man, but to be in quietness. 13 For Adam was formed first, then Eve. 14 Adam wasn't deceived, but the woman, being deceived, has fallen into disobedience; 15 but she will be saved through her childbearing, if they continue in faith, love, and holiness with sobriety.`,

      3: `1 This is a faithful saying: someone who seeks to be an overseer desires a good work. 2 The overseer therefore must be without reproach, the husband of one wife, temperate, sensible, modest, hospitable, good at teaching; 3 not a drinker, not violent, not greedy for money, but gentle, not quarrelsome, not covetous; 4 one who rules his own house well, having children in subjection with all reverence; 5 (for how could someone who doesn't know how to rule his own house take care of God's assembly?) 6 not a new convert, lest being puffed up he fall into the same condemnation as the devil. 7 Moreover he must have good testimony from those who are outside, to avoid falling into reproach and the snare of the devil.

8 Servants, in the same way, must be reverent, not double-tongued, not addicted to much wine, not greedy for money, 9 holding the mystery of the faith in a pure conscience. 10 Let them also first be tested; then let them serve if they are blameless. 11 Their wives in the same way must be reverent, not slanderers, temperate, and faithful in all things. 12 Let servants be husbands of one wife, ruling their children and their own houses well. 13 For those who have served well gain for themselves a good standing and great boldness in the faith which is in Christ Jesus.

14 These things I write to you, hoping to come to you shortly, 15 but if I wait long, that you may know how men ought to behave themselves in God's house, which is the assembly of the living God, the pillar and ground of the truth. 16 Without controversy, the mystery of godliness is great: God was revealed in the flesh, justified in the spirit, seen by angels, preached among the nations, believed on in the world, and received up in glory.`,

      4: `1 But the Spirit says expressly that in later times some will fall away from the faith, paying attention to seducing spirits and doctrines of demons, 2 through the hypocrisy of men who speak lies, branded in their own conscience as with a hot iron, 3 forbidding marriage and commanding to abstain from foods which God created to be received with thanksgiving by those who believe and know the truth. 4 For every creature of God is good, and nothing is to be rejected if it is received with thanksgiving. 5 For it is sanctified through the word of God and prayer.

11 Command and teach these things. 12 Let no man despise your youth; but be an example to those who believe, in word, in your way of life, in love, in spirit, in faith, and in purity. 13 Until I come, pay attention to reading, to exhortation, and to teaching. 14 Don't neglect the gift that is in you, which was given to you by prophecy with the laying on of the hands of the elders. 15 Be diligent in these things. Give yourself wholly to them, that your progress may be revealed to all. 16 Pay attention to yourself and to your teaching. Continue in these things, for in doing this you will save both yourself and those who hear you.`,

      5: `1 Don't rebuke an older man, but exhort him as a father; the younger men as brothers; 2 the elder women as mothers; the younger as sisters, in all purity.

3 Honor widows who are widows indeed. 4 But if any widow has children or grandchildren, let them learn first to show piety toward their own family and to repay their parents, for this is acceptable in the sight of God. 5 Now she who is a widow indeed and desolate, has her hope set on God and continues in petitions and prayers night and day. 6 But she who gives herself to pleasure is dead while she lives. 7 Also command these things, that they may be without reproach. 8 But if anyone doesn't provide for his own, and especially his own household, he has denied the faith and is worse than an unbeliever.

9 Let no one be enrolled as a widow under sixty years old, having been the wife of one man, 10 being approved by good works, if she has brought up children, if she has been hospitable to strangers, if she has washed the saints' feet, if she has relieved the afflicted, and if she has diligently followed every good work.

11 But refuse younger widows, for when they have grown wanton against Christ, they desire to marry, 12 having condemnation, because they have rejected their first pledge. 13 Besides, they also learn to be idle, going about from house to house. Not only idle, but also gossips and busybodies, saying things which they ought not. 14 I desire therefore that the younger widows marry, bear children, rule the household, and give no occasion to the adversary for insulting. 15 For already some have turned away after Satan. 16 If any man or woman who believes has widows, let them relieve them, and don't let the assembly be burdened, that it might relieve those who are widows indeed.

      6: `1 Let as many as are bondservants under the yoke count their own masters worthy of all honor, that the name of God and the doctrine not be blasphemed. 2 Those who have believing masters, let them not despise them because they are brothers, but rather let them serve them, because those who partake of the benefit are believing and beloved. Teach and exhort these things.

// ── State ───────────────────────────────────────────────────────────────────
let currentBook = null;
let currentChapter = null;
let chars = [];       // array of DOM span elements (typeable chars only)
let pos = 0;
let errors = 0;
let timerInterval = null;
let startTime = null;
let elapsed = 0;
let finished = false;

// ── localStorage helpers ────────────────────────────────────────────────────
function storageKey(book, ch) { return `btp_${book}_${ch}`; }

function getProgress(book, ch) {
    const v = localStorage.getItem(storageKey(book, ch));
    return v ? JSON.parse(v) : null;
}

function saveProgress(book, ch, accuracy, time) {
    const existing = getProgress(book, ch);
    if (!existing || accuracy >= existing.accuracy) {
        localStorage.setItem(storageKey(book, ch), JSON.stringify({ accuracy, time }));
    }
}

// ── Lookup ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('lookup-input')) {
        lookupWord();
    }
});

async function lookupWord() {
    const input = document.getElementById('lookup-input');
    const word = input.value.trim();
    if (!word) return;

    const resultEl = document.getElementById('lookup-result');
    const cambridgeEl = document.getElementById('cambridge-link');

    resultEl.innerHTML = '<span class="lookup-status">查詢中…</span>';
    cambridgeEl.style.display = 'none';

    try {
        const res = await fetch(
            `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`
        );
        const data = await res.json();
        const translation = data.responseData?.translatedText || '找不到結果';

        resultEl.innerHTML = `
            <div class="lookup-result-word">${word}</div>
            <div class="lookup-result-translation">${translation}</div>
        `;

        const slug = encodeURIComponent(word.toLowerCase().trim().replace(/\s+/g, '-'));
        cambridgeEl.href = `https://dictionary.cambridge.org/dictionary/english-chinese-traditional/${slug}`;
        cambridgeEl.style.display = 'block';

        // Save to vocab book
        addVocabWord(word, translation);
    } catch {
        resultEl.innerHTML = '<span class="lookup-status">查詢失敗，請檢查網路</span>';
    }
}

// ── Vocabulary ───────────────────────────────────────────────────────────────
function getVocab() { return JSON.parse(localStorage.getItem('btp_vocab') || '[]'); }
function saveVocab(arr) { localStorage.setItem('btp_vocab', JSON.stringify(arr)); }

function addVocabWord(word, translation) {
    const arr = getVocab();
    if (arr.find(v => v.word.toLowerCase() === word.toLowerCase())) return;
    arr.push({
        id: Date.now(),
        word,
        translation,
        book: currentBook ? BIBLE[currentBook].name : '',
        chapter: currentChapter || '',
        date: new Date().toLocaleDateString('zh-TW')
    });
    saveVocab(arr);
    const el = document.getElementById('vocab-count');
    if (el) el.textContent = arr.length + ' 個單字';
}

function deleteVocabWord(id) {
    saveVocab(getVocab().filter(v => v.id !== id));
    renderVocabList();
}

let vocabMode = 'list';
let cardIndex = 0;

function showVocab() {
    vocabMode = 'list';
    cardIndex = 0;
    renderVocabList();
    showScreen('screen-vocab');
}

function setVocabMode(mode) {
    vocabMode = mode;
    cardIndex = 0;
    document.getElementById('mode-list-btn').classList.toggle('active', mode === 'list');
    document.getElementById('mode-card-btn').classList.toggle('active', mode === 'card');
    vocabMode === 'list' ? renderVocabList() : renderFlashcard();
}

function renderVocabList() {
    const arr = getVocab();
    const el = document.getElementById('vocab-content');
    if (!arr.length) {
        el.innerHTML = '<p class="vocab-empty">還沒有查過的單字。打字時用右側查翻譯功能，查過的字會自動記錄在這裡。</p>';
        return;
    }
    el.innerHTML = `<div class="vocab-list">${arr.slice().reverse().map(v => `
        <div class="vocab-item">
            <div class="vocab-item-left">
                <div class="vocab-word">${v.word}</div>
                <div class="vocab-translation">${v.translation}</div>
                <div class="vocab-meta">${v.book ? v.book + (v.chapter ? ' · 第 ' + v.chapter + ' 章' : '') + ' · ' : ''}${v.date}</div>
            </div>
            <button class="vocab-delete" onclick="deleteVocabWord(${v.id})" title="刪除">✕</button>
        </div>`).join('')}</div>`;
}

function renderFlashcard() {
    const arr = getVocab();
    const el = document.getElementById('vocab-content');
    if (!arr.length) {
        el.innerHTML = '<p class="vocab-empty">還沒有單字可以複習。</p>';
        return;
    }
    const v = arr[cardIndex];
    el.innerHTML = `
        <div class="flashcard-wrap">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="flashcard-front-word">${v.word}</div>
                <div class="flashcard-back">
                    <div class="flashcard-back-translation">${v.translation}</div>
                    <div class="flashcard-back-meta">${v.book ? v.book + (v.chapter ? ' · 第 ' + v.chapter + ' 章' : '') : ''}</div>
                </div>
            </div>
            <p class="flashcard-hint">點卡片翻面查看中文</p>
            <div class="flashcard-controls">
                <button class="btn-secondary" onclick="moveCard(-1)" ${cardIndex === 0 ? 'disabled' : ''}>← 上一個</button>
                <span class="flashcard-counter">${cardIndex + 1} / ${arr.length}</span>
                <button class="btn-secondary" onclick="moveCard(1)" ${cardIndex === arr.length - 1 ? 'disabled' : ''}>下一個 →</button>
            </div>
        </div>`;
}

function flipCard() {
    document.getElementById('flashcard')?.classList.toggle('flipped');
}

function moveCard(dir) {
    const arr = getVocab();
    cardIndex = Math.max(0, Math.min(arr.length - 1, cardIndex + dir));
    renderFlashcard();
}

// ── Mid-chapter progress ─────────────────────────────────────────────────────
function midKey(book, ch) { return `btp_mid_${book}_${ch}`; }
function getMid(book, ch) { const v = localStorage.getItem(midKey(book, ch)); return v ? JSON.parse(v) : null; }
function saveMid() {
    if (!currentBook || pos === 0 || finished) return;
    localStorage.setItem(midKey(currentBook, currentChapter), JSON.stringify({ pos, errors, elapsed }));
}
function clearMid(book, ch) { localStorage.removeItem(midKey(book, ch)); }

// Save when page is hidden or closed
document.addEventListener('visibilitychange', () => { if (document.hidden) saveMid(); });
window.addEventListener('pagehide', saveMid);

// Resume state
let pendingResumeBook = null, pendingResumeChapter = null, pendingResumeState = null;

function doResume() {
    document.getElementById('resume-overlay').classList.remove('active');
    // Restore state
    pos = pendingResumeState.pos;
    errors = pendingResumeState.errors;
    elapsed = pendingResumeState.elapsed;

    // Recolor chars up to pos
    for (let i = 0; i < pos; i++) chars[i].classList.add('correct');
    chars[pos].classList.add('cursor');
    chars[pos].scrollIntoView({ block: 'center' });

    // Restore timer display
    document.getElementById('stat-errors').textContent = errors;
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('stat-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;

    // Restart timer
    startTime = Date.now();
    timerInterval = setInterval(() => {
        elapsed++;
        const mm = Math.floor(elapsed / 60);
        const ss = elapsed % 60;
        document.getElementById('stat-time').textContent = `${mm}:${ss.toString().padStart(2,'0')}`;
    }, 1000);
}

function doRestart() {
    document.getElementById('resume-overlay').classList.remove('active');
    clearMid(pendingResumeBook, pendingResumeChapter);
    pendingResumeState = null;
    // chars already built, just reset visually
    chars.forEach(c => c.classList.remove('correct', 'wrong', 'cursor'));
    pos = 0; errors = 0; elapsed = 0; startTime = null;
    document.getElementById('stat-time').textContent = '0:00';
    document.getElementById('stat-errors').textContent = '0';
    chars[0].classList.add('cursor');
    document.getElementById('text-display').scrollTop = 0;
    document.getElementById('text-display').focus();
}

// ── Menu ────────────────────────────────────────────────────────────────────
function buildMenu() {
    const container = document.getElementById('books-container');
    container.innerHTML = '';

    let totalCh = 0, doneCh = 0;
    for (const [bookKey, book] of Object.entries(BIBLE)) {
        const section = document.createElement('div');
        section.className = 'book-section';
        section.innerHTML = `<div class="book-title">${book.name}</div>`;

        const grid = document.createElement('div');
        grid.className = 'chapters-grid';

        const count = Object.keys(book.chapters).length;
        totalCh += count;
        for (let ch = 1; ch <= count; ch++) {
            const saved = getProgress(bookKey, ch);
            const mid = getMid(bookKey, ch);
            if (saved) doneCh++;

            const btn = document.createElement('button');
            btn.className = 'chapter-btn' + (saved ? ' completed' : '');
            let badge = '';
            if (saved) badge = `<span class="badge">✓ ${saved.accuracy}%</span>`;
            else if (mid) badge = `<span class="in-progress">● 進行中</span>`;
            btn.innerHTML = `Chapter ${ch}${badge}`;
            btn.onclick = () => startChapter(bookKey, ch);
            grid.appendChild(btn);
        }

        section.appendChild(grid);
        container.appendChild(section);
    }

    // Update progress bar
    const pct = Math.round((doneCh / totalCh) * 100);
    document.getElementById('progress-label').textContent = `已完成 ${doneCh}/${totalCh} 章`;
    document.getElementById('progress-pct').textContent = `${pct}%`;
    document.getElementById('progress-fill').style.width = `${pct}%`;

    // Update vocab count
    const vocab = getVocab();
    document.getElementById('vocab-count').textContent = vocab.length + ' 個單字';
}

// ── Start chapter ───────────────────────────────────────────────────────────
function startChapter(bookKey, chNum) {
    currentBook = bookKey;
    currentChapter = chNum;

    // Reset state
    chars = [];
    pos = 0;
    errors = 0;
    finished = false;
    elapsed = 0;
    startTime = null;
    clearInterval(timerInterval);

    const text = BIBLE[bookKey].chapters[chNum];

    document.getElementById('chapter-title').textContent =
        `${BIBLE[bookKey].name} · Chapter ${chNum}`;
    document.getElementById('stat-time').textContent = '0:00';
    document.getElementById('stat-errors').textContent = '0';

    // Build display — verse numbers shown but not typed, newlines become <br>
    const display = document.getElementById('text-display');
    display.innerHTML = '';
    display.scrollTop = 0;

    const paragraphs = text.split('\n');
    for (let pi = 0; pi < paragraphs.length; pi++) {
        if (pi > 0) display.appendChild(document.createElement('br'));
        const para = paragraphs[pi];
        if (!para) continue;

        // Split by verse numbers: digits followed by a space
        const parts = para.split(/(\d+) /);
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                // Verse number — display only, not typeable
                const vspan = document.createElement('span');
                vspan.className = 'verse-num';
                vspan.textContent = parts[i] + ' ';
                display.appendChild(vspan);
            } else {
                // Regular text — each char becomes a typeable span
                for (const char of parts[i]) {
                    const span = document.createElement('span');
                    span.className = 'ch';
                    span.textContent = char;
                    display.appendChild(span);
                    chars.push(span);
                }
            }
        }
    }

    if (chars.length > 0) chars[0].classList.add('cursor');

    display.onkeydown = handleKey;
    showScreen('screen-typing');

    // Check for mid-chapter progress
    const mid = getMid(bookKey, chNum);
    if (mid && mid.pos > 0) {
        pendingResumeBook = bookKey;
        pendingResumeChapter = chNum;
        pendingResumeState = mid;
        const totalPct = Math.round((mid.pos / chars.length) * 100);
        document.getElementById('resume-desc').textContent =
            `上次打到第 ${mid.pos} 個字（共 ${chars.length} 字，約 ${totalPct}%）。`;
        document.getElementById('resume-overlay').classList.add('active');
    } else {
        display.focus();
    }
}

// ── Key handler ─────────────────────────────────────────────────────────────
function handleKey(e) {
    if (finished) return;

    if (['Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'Tab',
         'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) return;

    if (e.key === 'Escape') { exitToMenu(); return; }

    e.preventDefault();

    if (e.key === 'Backspace') {
        if (pos > 0) {
            chars[pos].classList.remove('cursor');
            pos--;
            chars[pos].classList.remove('correct', 'wrong');
            chars[pos].classList.add('cursor');
        }
        return;
    }

    if (e.key.length !== 1) return;

    // Start timer on first keystroke
    if (!startTime) {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            elapsed++;
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            document.getElementById('stat-time').textContent =
                `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    const expected = chars[pos].textContent;
    chars[pos].classList.remove('cursor');

    if (e.key === expected) {
        chars[pos].classList.add('correct');
    } else {
        chars[pos].classList.add('wrong');
        errors++;
        document.getElementById('stat-errors').textContent = errors;
    }

    pos++;

    if (pos >= chars.length) {
        finishChapter();
        return;
    }

    chars[pos].classList.add('cursor');
    chars[pos].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Finish ──────────────────────────────────────────────────────────────────
function finishChapter() {
    finished = true;
    clearInterval(timerInterval);

    const wrongCount = chars.filter(s => s.classList.contains('wrong')).length;
    const accuracy = Math.round(((chars.length - wrongCount) / chars.length) * 100);

    saveProgress(currentBook, currentChapter, accuracy, elapsed);
    clearMid(currentBook, currentChapter);

    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const timeStr = `${m}:${s.toString().padStart(2, '0')}`;

    document.getElementById('result-title').textContent =
        `${BIBLE[currentBook].name} · Chapter ${currentChapter}`;
    document.getElementById('result-accuracy').textContent = `${accuracy}%`;
    document.getElementById('result-time').textContent = timeStr;
    document.getElementById('result-errors').textContent = errors;

    // Next button label
    const nextBtn = document.getElementById('next-btn');
    const bookKeys = Object.keys(BIBLE);
    const bookIdx = bookKeys.indexOf(currentBook);
    const chCount = Object.keys(BIBLE[currentBook].chapters).length;

    if (currentChapter < chCount) {
        nextBtn.style.display = 'inline-block';
        nextBtn.textContent = 'Next Chapter →';
    } else if (bookIdx < bookKeys.length - 1) {
        nextBtn.style.display = 'inline-block';
        nextBtn.textContent = `Next Book →`;
    } else {
        nextBtn.style.display = 'none';
    }

    showScreen('screen-results');
}

function goToNext() {
    const bookKeys = Object.keys(BIBLE);
    const bookIdx = bookKeys.indexOf(currentBook);
    const chCount = Object.keys(BIBLE[currentBook].chapters).length;

    if (currentChapter < chCount) {
        startChapter(currentBook, currentChapter + 1);
    } else if (bookIdx < bookKeys.length - 1) {
        startChapter(bookKeys[bookIdx + 1], 1);
    }
}

function exitToMenu() {
    clearInterval(timerInterval);
    saveMid();
    goToMenu();
}

function goToMenu() {
    clearInterval(timerInterval);
    buildMenu();
    showScreen('screen-menu');
}

function showScreen(id) {
    for (const s of ['screen-menu', 'screen-typing', 'screen-results', 'screen-vocab']) {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    }
}

// ── Init ────────────────────────────────────────────────────────────────────
buildMenu();
</script>
